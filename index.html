<!DOCTYPE html>
<title>StaticShop API</title>
<h1>✅ JSON API Live</h1>
<pre id="data">Loading...</pre>
<script>
fetch('https://raw.githubusercontent.com/22f1000545/staticshop-api/main/api.json')
  .then(r=>r.json())
  .then(data=>document.getElementById('data').textContent=JSON.stringify(data,null,2))
  .catch(e=>document.getElementById('data').textContent='Error: '+e);
</script>
